python:
  - 3.10
  - 3.11
  - 3.12
  - 3.13

# nvshmem examples are still being compiled with c/cxx 13 for linux64/aarch64
# Pretty much have to duplicate the global pinning entries and downgrade the current version (v14) to v13
# For CUDA13, let the .ci_support/migrations/cuda130.yaml stick with v14
c_compiler_version:            # [unix]
  - 13                         # [linux]
  - 13                         # [linux and not ppc64le and os.environ.get("CF_CUDA_ENABLED", "False") == "True"]

cxx_compiler_version:          # [unix]
  - 13                         # [linux]
  - 13                         # [linux and not ppc64le and os.environ.get("CF_CUDA_ENABLED", "False") == "True"]

c_stdlib_version:              # [linux]
  - 2.17                       # [linux]
  - 2.28                       # [linux and not ppc64le and os.environ.get("CF_CUDA_ENABLED", "False") == "True"]
